<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Feria Tecnología IPMHU</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="app">
    <!-- Cabecera móvil -->
    <div class="mobile-header">
      <button id="menu-toggle" class="menu-toggle">☰</button>
      <div class="mobile-title">Feria Tecnología</div>
    </div>
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">Feria de Tecnología<br/>IPMHU</div>
        <div class="sidebar-sub">2025 — 2026</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-view="proyectos">📡 Proyectos</div>
        <div class="nav-item" data-view="resultados">🏆 Resultados</div>
      </nav>
      <div class="sidebar-footer">
        <div id="admin-section">
          <button id="btn-login" class="btn-login">🔐 Admin</button>
          <button id="btn-logout" style="display:none;" class="btn-logout">🚪 Cerrar sesión</button>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <!-- Vista Proyectos -->
      <div id="view-proyectos" class="view active">
        <div class="content-header">
          <div><div class="page-title">Proyectos</div><div class="page-sub">FERIA DE TECNOLOGÍA 2025-2026</div></div>
          <button id="btn-nuevo-proyecto" class="btn-sm cyan admin-only" style="display:none;">+ NUEVO PROYECTO</button>
        </div>
        <div class="content-body">
          <div id="proyectos-container" class="cursos-grid">Cargando...</div>
        </div>
      </div>
      <!-- Vista Resultados -->
      <div id="view-resultados" class="view">
        <div class="content-header">
          <div><div class="page-title">Resultados</div><div class="page-sub">RANKING DE VOTACIONES</div></div>
          <button id="btn-toggle-resultados" class="btn-sm cyan admin-only" style="display:none;">📢 PUBLICAR RESULTADOS</button>
        </div>
        <div class="content-body">
          <div id="resultados-container">Cargando...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal de votación -->
  <div id="modal-voto" class="modal-overlay">
    <div class="modal-box" style="max-width: 400px;">
      <div class="modal-header">
        <div class="modal-title" id="modal-voto-title">Votar</div>
        <button id="modal-voto-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-voto-body">
        <!-- Contenido dinámico -->
      </div>
    </div>
  </div>

  <!-- Modal de login admin -->
  <div id="modal-login" class="modal-overlay">
    <div class="modal-box" style="max-width: 350px;">
      <div class="modal-header">
        <div class="modal-title">Acceso Administrador</div>
        <button id="modal-login-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="admin@ipmhu.edu">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••">
        </div>
        <button id="login-submit" class="btn-primary">INGRESAR</button>
        <div id="login-error" class="error-msg" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Modal de creación/edición de proyecto (admin) -->
  <div id="modal-proyecto" class="modal-overlay">
    <div class="modal-box" style="max-width: 600px;">
      <div class="modal-header">
        <div class="modal-title" id="proyecto-modal-title">Registrar Proyecto</div>
        <button id="modal-proyecto-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nombre del proyecto</label>
          <input type="text" id="proy-nombre" placeholder="Ej: Robot reciclador">
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea id="proy-desc" rows="3" placeholder="Breve descripción..."></textarea>
        </div>
        <div class="form-group">
          <label>PIN (4 dígitos)</label>
          <input type="tel" id="proy-pin" maxlength="4" inputmode="numeric" placeholder="1234">
        </div>
        <div class="form-group">
          <label>Representantes</label>
          <div id="reps-container"></div>
          <button type="button" id="agregar-rep" class="btn-sm">+ Agregar representante</button>
        </div>
        <div class="form-actions">
          <button id="guardar-proyecto" class="btn-primary">GUARDAR</button>
          <button id="cancelar-proyecto" class="btn-sm">CANCELAR</button>
        </div>
        <div id="proyecto-error" class="error-msg"></div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
